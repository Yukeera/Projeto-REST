<div class="page-header">
  <h2>Motoristas</h2>
  <button mat-raised-button color="primary" (click)="openCreateForm()">
    <mat-icon>add</mat-icon> Novo Motorista
  </button>
</div>

<mat-card *ngIf="showForm" class="form-card">
  <mat-card-title>{{ editingDriver ? 'Editar Motorista' : 'Novo Motorista' }}</mat-card-title>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="saveDriver()" class="form-grid">

      <mat-form-field appearance="outline">
        <mat-label>Nome Completo</mat-label>
        <input matInput formControlName="name" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Número da CNH</mat-label>
        <input matInput formControlName="license_number" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Telefone</mat-label>
        <input matInput formControlName="phone" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Status</mat-label>
        <mat-select formControlName="status">
          <mat-option value="available">Disponível</mat-option>
          <mat-option value="on_route">Em rota</mat-option>
          <mat-option value="unavailable">Indisponível</mat-option>
        </mat-select>
      </mat-form-field>

      <div class="form-actions">
        <button mat-button type="button" (click)="showForm = false">Cancelar</button>
        <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
          {{ editingDriver ? 'Salvar Alterações' : 'Criar Motorista' }}
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>

<table mat-table [dataSource]="drivers" class="mat-elevation-z2 full-width">

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Nome</th>
    <td mat-cell *matCellDef="let d">{{ d.name }}</td>
  </ng-container>

  <ng-container matColumnDef="license_number">
    <th mat-header-cell *matHeaderCellDef>CNH</th>
    <td mat-cell *matCellDef="let d">{{ d.license_number }}</td>
  </ng-container>

  <ng-container matColumnDef="phone">
    <th mat-header-cell *matHeaderCellDef>Telefone</th>
    <td mat-cell *matCellDef="let d">{{ d.phone }}</td>
  </ng-container>

  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>Status</th>
    <td mat-cell *matCellDef="let d">
      <mat-chip [color]="statusColors[d.status]" highlighted>
        {{ statusLabels[d.status] }}
      </mat-chip>
    </td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Ações</th>
    <td mat-cell *matCellDef="let d">
      <button mat-icon-button color="primary" title="Editar" (click)="openEditForm(d)">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button color="warn" title="Remover" (click)="deleteDriver(d.id)">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
